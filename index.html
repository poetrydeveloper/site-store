<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скоро здесь будет сайт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .countdown {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            background: #5a67d8;
        }
        
        .social-links {
            margin-top: 30px;
        }
        
        .social-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            font-size: 24px;
        }
        
        .social-links a:hover {
            color: #764ba2;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">
            🚀
        </div>
        
        <h1>
            Скоро здесь будет<br>
            что-то удивительное!
        </h1>
        
        <p>
            Мы усердно работаем над новым сайтом.<br>
            Оставайтесь с нами — скоро запуск!
        </p>
        
        <div class="countdown" id="countdown"></div>
        
        <p>
            <strong>Хотите узнать первым о запуске?</strong><br>
            Оставьте свой email:
        </p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Ваш email">
            <button onclick="subscribe()">Подписаться</button>
        </div>
        
        <div class="social-links">
            <a href="#">📘 Facebook</a>
            <a href="#">📸 Instagram</a>
            <a href="#">🐦 Twitter</a>
            <a href="#">💬 Telegram</a>
        </div>
    </div>
    
    <script>
        // Таймер обратного отсчета (до Нового года или укажите свою дату)
        function updateCountdown() {
            // Укажите свою дату запуска (год, месяц (0-11), день)
            const launchDate = new Date(2025, 0, 1); // 1 января 2025
            const now = new Date();
            const diff = launchDate - now;
            
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "Запуск состоялся! 🎉";
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdown').innerHTML = 
                `${days}д ${hours}ч ${minutes}м ${seconds}с`;
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
        
        // Функция подписки (пока просто показывает сообщение)
        function subscribe() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('Пожалуйста, введите email');
                return;
            }
            
            if (!email.includes('@')) {
                alert('Введите корректный email');
                return;
            }
            
            // Здесь вы можете добавить отправку на ваш email или в базу данных
            alert(`Спасибо за подписку, ${email}! Мы сообщим вам о запуске.`);
            document.getElementById('email').value = '';
        }
        
        // Добавляем обработчик Enter в поле email
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                subscribe();
            }
        });
    </script>
</body>
</html>
